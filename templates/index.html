<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>噠噠特工 - 最終調試版</title>
    <style>
        body { background: #1a1a1a; color: white; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; font-family: 'Courier New', monospace; }
        canvas { background: #000; border: 4px solid #555; image-rendering: pixelated; box-shadow: 0 0 20px #000; cursor: crosshair; }
        .ui { margin-bottom: 10px; font-size: 1.2em; font-weight: bold; color: #00ffcc; text-shadow: 2px 2px #000; }
    </style>
</head>
<body>
    <div class="ui">鍵盤 WASD 移動 | 滑鼠點擊敵人 | 按「1」釋放冰刺</div>
    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // 資源路徑 (完全對應你 static/assets 的檔名)
        const img = {
            player: new Image(), bat: new Image(), ice: new Image(),
            ground: new Image(), skill: new Image()
        };
        img.player.src = '/static/assets/player.png';
        img.bat.src = '/static/assets/bat.png';
        img.ice.src = '/static/assets/ice_skill.png';
        img.ground.src = '/static/assets/ground.png';
        img.skill.src = '/static/assets/skill.png';

        let player = { x: 400, y: 300, frame: 0, speed: 4, width: 0, height: 0 };
        let enemies = [], crystals = [], effects = [], keys = {};

        window.addEventListener('keydown', e => {
            keys[e.key.toLowerCase()] = true;
            if (e.key === '1') spawnIceSkill();
        });
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

        canvas.addEventListener('mousedown', e => {
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;
            enemies.forEach(en => {
                if (Math.abs(mx - en.x) < 40 && Math.abs(my - en.y) < 40) en.hp -= 20;
            });
        });

        async function initGame() {
            const res = await fetch('/api/init_level');
            const data = await res.json();
            enemies = data.enemies;
            crystals = data.crystals; // 此處對應冰刺或水晶
            player.width = img.player.width / 8;
            player.height = img.player.height;
            requestAnimationFrame(gameLoop);
        }

        function spawnIceSkill() {
            effects.push({ x: player.x, y: player.y, frame: 0, timer: 0 });
            enemies.forEach(en => {
                let d = Math.sqrt((player.x - en.x)**2 + (player.y - en.y)**2);
                if (d < 150) en.hp -= 50;
            });
        }

        function update() {
            if (keys['w']) player.y -= player.speed;
            if (keys['s']) player.y += player.speed;
            if (keys['a']) player.x -= player.speed;
            if (keys['d']) player.x += player.speed;
            
            player.frame = (Math.floor(Date.now() / 100) % 8);

            enemies.forEach((bat, i) => {
                let dx = player.x - bat.x, dy = player.y - bat.y, d = Math.sqrt(dx*dx + dy*dy);
                bat.x += (dx/d) * bat.speed; bat.y += (dy/d) * bat.speed;
                bat.animFrame = (Math.floor(Date.now() / 120) % 4);
                if (bat.hp <= 0) enemies.splice(i, 1);
            });

            effects.forEach((eff, i) => {
                eff.timer++;
                if (eff.timer % 6 === 0) eff.frame++;
                if (eff.frame >= 4) effects.splice(i, 1);
            });
        }

        function draw() {
            ctx.drawImage(img.ground, 0, 0, 800, 600);

            // 畫敵人 (4幀)
            const bW = img.bat.width / 4;
            enemies.forEach(bat => {
                ctx.drawImage(img.bat, bat.animFrame * bW, 0, bW, img.bat.height, bat.x, bat.y, 64, 64);
            });

            // 畫冰刺特效 (4階段)
            const iW = img.ice.width / 4;
            effects.forEach(eff => {
                ctx.drawImage(img.ice, eff.frame * iW, 0, iW, img.ice.height, eff.x - 32, eff.y - 32, 128, 128);
            });

            // 畫玩家 (8幀)
            ctx.drawImage(img.player, player.frame * player.width, 0, player.width, img.player.height, player.x, player.y, 64, 64);

            // 畫技能 UI (底端)
            ctx.drawImage(img.skill, 200, 520, 400, 70);
        }

        function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }
        
        // 確保圖片載入後啟動
        img.ground.onload = initGame;
    </script>
</body>
</html>
